<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow-lg p-4 login-card">
        <h3 class="text-center mb-4">Employee Department Login</h3>

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" type="text" placeholder="Username" [(ngModel)]="username">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" placeholder="Password" [(ngModel)]="password">
        </div>

        <div class="d-grid mt-4">
            <button class="btn btn-primary" (click)="login()">LOGIN</button>
        </div>
    </div>
</div>
