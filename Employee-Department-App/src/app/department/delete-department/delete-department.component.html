<div class="container mt-4">
    <div class="card-shadow">
        <div class="card-header bg-danger text-black">
            <h4 class="mb-0">Delete Department</h4>
        </div>

        <div class="card-body">
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Department ID</label>
                    <input type="text" class="form-control" [value]="departments.deptId" disabled>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Department Name</label>
                    <input type="text" class="form-control" [value]="departments.name" disabled>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" [value]="departments.location" disabled>
                </div>
            </div>

            <div class="mt-4">
                <label class="form-label d-block">Are you sure you want to Delete this Department</label>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirm" value="YES" [(ngModel)]="confirmDelete">
                    <label class="form-check-label">Yes! Delete</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirm" value="NO" [(ngModel)]="confirmDelete">
                    <label class="form-check-label">No, Cancel</label>
                </div>
            </div>

            <div class="d-grid mt-4">
                <button type="button" class="btn btn-danger" [disabled]="!confirmDelete" (click)="deleteDepartments()">
                    Confirm
                </button>

                <button type="button" class="btn btn-secondary" (click)="goBack()">
                    <- Back
                </button>
            </div>

        </div>
    </div>
</div>
