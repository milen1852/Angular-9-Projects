<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Employee Records</h4>

        <div>
            <button class="btn btn-primary me-2" [disabled]="selectedEmployee" [routerLink]="['/add-employee']">
                Create
            </button>

            <button class="btn btn-success" [disabled]="!selectedEmployee" (click)="viewEmployee()">
                View
            </button>

            <button class="btn btn-warning" [disabled]="!selectedEmployee" (click)="updateEmployee()">
                Edit
            </button>

            <button class="btn btn-danger" [disabled]="!selectedEmployee || selectedEmployee.status === 'INACTIVE'" (click)="deleteEmployee()">
                Delete
            </button>
        </div>
    </div>

    <div class="card-shadow-sm mb-4">
        <div class="card-reader bg-light fw-semibold">
            Search & Filters
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="text" placeholder="Search First Name" class="form-control" [(ngModel)]="firstName">
                </div>
                <div class="col-md-3">
                    <input type="text" placeholder="Search Last Name" class="form-control" [(ngModel)]="lastName">
                </div>
                <div class="col-md-3">
                    <input type="email" placeholder="Search Email" class="form-control" [(ngModel)]="email">
                </div>
                <div class="col-md-3">
                    <input type="number" placeholder="Search Dept ID" class="form-control" [(ngModel)]="deptId">
                </div>

                <div class="col-md-3">
                    <input type="text" placeholder="Select Hire Date Range" class="form-control" ngxDaterangepickerMd name="hireDateRange"
                    [(ngModel)]="hireDateRange" [showCustomRangeLabel]="true" [autoApply]="false" [showDropdowns]="true" [ranges]="ranges"
                    [linkedCalendars]="false" [alwaysShowCalendars]="true" [keepCalendarOpeningWithRange]="true" [maxDate]="maxDate"
                    [singleDatePicker]="false" [showClearButton]="true" [locale]="{format: 'YYYY/MM/DD'}"> 
                </div>
                
                <div class="col-md-3">
                    <input type="number" placeholder="Search Min Salary" class="form-control" [(ngModel)]="minSalary">
                </div>
                <div class="col-md-3">
                    <input type="number" placeholder="Search Max Salary" class="form-control" [(ngModel)]="maxSalary">
                </div>

                <div class="col-md-3">
                    <select class="form-select" [(ngModel)]="status">
                        <option value="">All Status</option>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>
                </div>

            </div>
            <div class="mt-3 text-end">
                <button class="btn btn-success" (click)="searchEmployees()">
                    <i class="bi bi-search"></i> Search
                </button>

                <button class="btn btn-outline-secondary ms-2" (click)="resetFilters()">
                    Reset
                </button>
            </div>
        </div>
    </div>


    <div class="table-responsive">
        <table id="employeeTable" class="table table-hover table-bordered table-striped mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Emp ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone Number</th>
                    <th>Dept ID</th>
                    <th>Salary</th>
                    <th>Status</th>
                    <th>Hire Date</th>
                </tr>
            </thead>

            <button class="btn btn-outline-secondary me-2" [disabled]="page === 0" (click)="prevPage()">
                ⬅ Prev
            </button>
            <button class="btn btn-outline-secondary ms-2" [disabled]="(page + 1) * size >= totalElements"
                (click)="nextPage()">
                Next ➡
            </button>
        </table>
    </div>

    <div class="d-grid mt-3">
        <button class="btn btn-secondary" (click)="goBack()">
            <- Dashboard
        </button>
    </div>
</div>
