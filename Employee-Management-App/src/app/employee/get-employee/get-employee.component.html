<div class="container mt-4">

  <!-- 🔹 PAGE HEADER & ACTIONS -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Employees</h3>

    <div>

      <button class="btn btn-primary me-2" [routerLink]="['/add-employee']">
        <i class="bi bi-plus-circle"></i> Create Employee
      </button>

      <button class="btn btn-success me-2" [disabled]="!selectedEmployee" (click)="getEmployeeWithDepartment()">
        <i class="bi bi-pencil-square"></i> View
      </button>

      <button class="btn btn-warning me-2" [disabled]="!selectedEmployee" (click)="editEmployee()">
        <i class="bi bi-pencil-square"></i> Edit
      </button>

      <button class="btn btn-danger" [disabled]="!selectedEmployee" (click)="deleteEmployee()">
        <i class="bi bi-trash"></i> Delete
      </button>
    </div>
  </div>

  <!-- 🔍 SEARCH & FILTERS -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-light fw-semibold">
      Search & Filters
    </div>

    <div class="card-body">
      <div class="row g-3">

        <div class="col-md-3">
          <input type="text" class="form-control" placeholder="Search name" [(ngModel)]="searchName">
        </div>

        <div class="col-md-3">
          <input type="email" class="form-control" placeholder="Search Email" [(ngModel)]="email">
        </div>

        <div class="col-md-3">
          <input type="number" class="form-control" placeholder="Search Department ID" [(ngModel)]="deptId">
        </div>

        <div class="col-md-3">
          <input type="number" class="form-control" placeholder="Min Salary" [(ngModel)]="minSalary">
        </div>

        <div class="col-md-3">
          <input type="number" class="form-control" placeholder="Max Salary" [(ngModel)]="maxSalary">
        </div>

        <div class="col-md-3">

          <input type="text" class="form-control" ngxDaterangepickerMd [(ngModel)]="hireDateRange" name="hireDateRange"
            [ranges]="ranges" [showCustomRangeLabel]="true" [autoApply]="false" [showDropdowns]="true"
            [linkedCalendars]="false" [alwaysShowCalendars]="true" [keepCalendarOpeningWithRange]="true"
            [singleDatePicker]="false" [showClearButton]="true" [locale]="{ format: 'YYYY-MM-DD' }" [maxDate]="maxDate"
            placeholder="Select Hire Date Range" />
        </div>


        <div class="col-md-3">
          <select class="form-select" [(ngModel)]="status">
            <option value="">All Status</option>
            <option value="ACTIVE">ACTIVE</option>
            <option value="INACTIVE">INACTIVE</option>
          </select>
        </div>

      </div>

      <div class="mt-3 text-end">
        <button class="btn btn-success" (click)="searchEmployees()">
          <i class="bi bi-search"></i> Search
        </button>

        <button class="btn btn-outline-secondary ms-2" (click)="resetFilters()">
          Reset
        </button>
      </div>
    </div>
  </div>

  <!-- 📋 EMPLOYEE TABLE -->
  <div class="card shadow-sm">
    <div class="card-body p-0">

      <div class="table-responsive">
        <table id="employeeTable" class="table table-hover table-bordered table-striped mb-0">
          <thead class="table-dark">
            <tr>
              <th>Employee ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone Number</th>
              <th>Dept ID</th>
              <th>Salary</th>
              <th>Status</th>
              <th>Hire Date</th>
            </tr>
          </thead>

          <tbody>
            <!-- DataTables inserts rows -->
          </tbody>
        </table>
      </div>

      <!-- 🔁 PAGINATION FOOTER -->
      <div class="d-flex justify-content-between align-items-center p-3">

        <div class="text-muted">
          Showing
          <strong>{{ getFromIndex() }}</strong>
          –
          <strong>{{ getToIndex() }}</strong>
          of
          <strong>{{ totalElements }}</strong>
          employees
        </div>

        <div>
          <button class="btn btn-outline-secondary me-2" [disabled]="page === 0" (click)="prevPage()">
            ⬅ Prev
          </button>

          <span class="fw-semibold">
            Page {{ page + 1 }}
          </span>

          <button class="btn btn-outline-secondary ms-2" [disabled]="(page + 1) * size >= totalElements"
            (click)="nextPage()">
            Next ➡
          </button>
        </div>

      </div>
    </div>
  </div>
  <button class="btn btn-secondary" (click)="goBack()">
    Go to Dashboard
  </button>

</div>
