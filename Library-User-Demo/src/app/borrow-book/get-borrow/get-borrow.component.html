<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">BORROWED BOOKS</h4>

        <div class="button1">

            <div class="tooltip-wrap me-2">
                <button class="btn btn-primary me-2" [disabled]="selectedBook" [routerLink]="['/add-borrow']">
                    Borrow a Book
                </button>
                <span class="tooltip-text" *ngIf="selectedBook">
                    Deselect the row
                </span>
            </div>

            <div class="tooltip-wrap me-2">
                <button class="btn btn-success" [disabled]="!selectedBook" (click)="viewBorrowBook()">
                    View
                </button>
                <span class="tooltip-text" *ngIf="!selectedBook">
                    Select a Book to View
                </span>
            </div>

            <div class="tooltip-wrap me-2">
                <button class="btn btn-warning me-2" [disabled]="!selectedBook || selectedBook.status !== 'BORROWED'"
                    (click)="returnSelected()">
                    Return Book
                </button>
                <span class="tooltip-text" *ngIf="!selectedBook">
                    Select a Borrowed Book
                </span>
                <span class="tooltip-text" *ngIf="selectedBook && selectedBook.status === 'RETURNED'">
                    Book Already Returned
                </span>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-light fw-semibold">
            Search & Filters
        </div>

        <div class="card-body">
            <div class="row g-3">

                <div class="col-md-3">
                    <input type="number" class="form-control" placeholder="Search Book ID" [(ngModel)]="bookId">
                </div>

                <div class="col-md-3">
                    <input type="text" class="form-control" placeholder="Search Borrowed By" [(ngModel)]="borrowedBy">
                </div>

                <div class="col-md-3">
                    <input type="text" class="form-control" name="borrowedDateRange" ngxDaterangepickerMd [(ngModel)]="borrowedDateRange" 
                    [autoApply]="false" [alwaysShowCalendars]="true" [showCustomRangeLabel]="true" [linkedCalendars]="true" [keepCalendarOpeningWithRange]="true" [singleDatePicker]="false" 
                    [showClearButton]="true" [showDropdowns]="true" [maxDate]="maxDate" [ranges]="ranges" 
                    placeholder="Select Borrowed Date Range" [locale]="{format: 'YYYY/MM/DD'}">
                </div>

                <div class="col-md-3">
                    <select name="status" class="form-control" [(ngModel)]="status">
                        <option value="">All Book Status</option>
                        <option value="BORROWED">BORROWED</option>
                        <option value="RETURNED">RETURNED</option>
                    </select>
                </div>
            </div>

            <div class="button2">
                <button class="btn btn-success" (click)="searchBooks()">
                    Search
                </button>

                <button class="btn btn-outline-secondary" (click)="resetFilters()">
                    Reset
                </button>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">

            <div class="table-responsive">
                <table id="borrowTable" class="table table-hover table-bordered table-striped mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th style="display: none;">Borrow ID</th>
                            <th>Book ID</th>
                            <th>Borrowed By</th>
                            <th>Borrowed Date</th>
                            <th>Due Date</th>
                            <th>Return Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center p-3">

                <div class="d-flex align-items-center">
                    <span class="me-2 fw-semibold mr-1">Show</span>

                    <select class="form-select form-select-sm w-auto" [(ngModel)]="size" (change)="onSizeChange()">

                        <option [ngValue]="5">5</option>
                        <option [ngValue]="10">10</option>
                        <option [ngValue]="15">15</option>
                    </select>
                    <span class="ms-2 fw-semibold ml-1">Entries</span>
                </div>

                <div class="button3">
                    <button class="btn btn-outline-primary" [disabled]="page === 0" (click)="prevPage()">
                        <- Prev </button>

                            <span class="fw-semibold">
                                Page {{page + 1}}
                            </span>

                            <button class="btn btn-outline-primary" [disabled]="(page + 1) * size >= totalElements"
                                (click)="nextPage()">
                                Next ->
                            </button>
                </div>
            </div>
        </div>
    </div>

    <div class="d-grid mt-4">
        <button type="button" class="btn btn-secondary" (click)="goBack()">
            <- Go to Dashboard </button>
    </div>
</div>
