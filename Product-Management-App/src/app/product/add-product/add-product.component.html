<div class="container mt-5">
   <div class="card shadow">
      <div class="card-header bg-primary text-black">
         <h4 class="mb-0">Add Product</h4>
      </div>

      <div class="card-body">
         <form #form="ngForm" novalidate>
            <div class="row g-5">
               <div class="col-md-6 mb-4">
                  <label class="form-label">Product ID</label>
                  <input type="number" class="form-control" name="prodId" placeholder="Product ID"
                     [(ngModel)]="product.prodId" [class.is-invalid]="errorMessages.prodId">
                  <div *ngIf="errorMessages.prodId" class="text-danger">
                     <small>{{errorMessages.prodId[0]}}</small>
                  </div>
               </div>

               <div class="col-md-6 mb-4">
                  <label class="form-label">Product Name</label>
                  <input type="text" class="form-control" name="prodName" placeholder="Product Name"
                     [(ngModel)]="product.prodName" [class.is-invalid]="errorMessages.prodName">
                  <div *ngIf="errorMessages.prodName" class="text-danger">
                     <small>{{errorMessages.prodName[0]}}</small>
                  </div>
               </div>

               <div class="col-md-6 mb-4">
                  <label class="form-label">Product Category</label>
                  <input type="text" class="form-control" name="prodId" placeholder="Product Category"
                     [(ngModel)]="product.prodCategory" [class.is-invalid]="errorMessages.prodCategory">
                  <div *ngIf="errorMessages.prodCategory" class="text-danger">
                     <small>{{errorMessages.prodCategory[0]}}</small>
                  </div>
               </div>

               <div class="col-md-6 mb-4">
                  <label class="form-label">Product Price</label>
                  <input type="number" class="form-control" name="prodPrice" placeholder="Product Price"
                     [(ngModel)]="product.prodPrice" [class.is-invalid]="errorMessages.prodPrice">
                  <div *ngIf="errorMessages.prodPrice" class="text-danger">
                     <small>{{errorMessages.prodPrice[0]}}</small>
                  </div>
               </div>

               <div class="col-md-6 mb-4">
                  <label class="form-label">Product Quantity</label>
                  <input type="number" class="form-control" name="prodQuantity" placeholder="Product Quantity"
                     [(ngModel)]="product.prodQuantity" [class.is-invalid]="errorMessages.prodQuantity">
                  <div *ngIf="errorMessages.prodQuantity" class="text-danger">
                     <small>{{errorMessages.prodQuantity[0]}}</small>
                  </div>
               </div>

               <div class="col-md-6 mb-4">
                  <label class="form-label">Order Date</label>
                  <input type="date" name="orderDate" class="form-control" placeholder="Order Date"
                     [(ngModel)]="product.orderDate">
               </div>
            </div>

            <div class="d-grid mt-4">

               <button class="btn btn-primary" (click)="addProduct(form)">
                  Add Product
               </button>

               <button class="btn btn-outline-primary" (click)="clearForm(form)">
                  Clear Form
               </button>

               <button class="btn btn-secondary" (click)="goBack()">
                  <- Back </button>
            </div>

         </form>
      </div>

   </div>
</div>
