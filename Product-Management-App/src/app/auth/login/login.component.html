<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow-lg p-4 login-card">

        <h4 class="text-center mb-4">Product Management Login</h4>

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" placeholder="Enter Username" [(ngModel)]="user.username"> 
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Enter Password" [(ngModel)]="user.password"> 
        </div>

        <div class="d-grid mt-4">
            <button type="button" class="btn btn-primary" (click)="login()">
                LOGIN
            </button>
        </div>

    </div> 
</div>
