<table id="productsTable" class="display futuristic-table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Category</th>
      <th>Price</th>
      <th>Quantity</th>
    </tr>
  </thead>
</table>


<div class="action-panel" *ngIf="selectedProduct">
  <span class="selected-text">
    Selected: {{ selectedProduct.prodName }}
  </span>

  <button class="edit-btn" (click)="editProduct()">Edit</button>
  <button class="delete-btn" (click)="deleteProduct()">Delete</button>
</div>
