<div class="topbar">
  <h1 class="title">Product Management Dashboard</h1>

  <!-- Logout button at extreme right -->
  <app-logout></app-logout>
</div>


<div class="container page-container text-center">
  <div class="row justify-content-center">

    <div class="col-md-4 m-4">
      <div class="card-custom">
        <h5>View Products</h5>
        <p class="text-muted">Display all products</p>
        <button class="btn btn-success btn-custom w-100" routerLink="/get">
          GET PRODUCTS
        </button>
      </div>
    </div>

    <div class="col-md-4 m-4">
      <div class="card-custom">
        <h5>Add Product</h5>
        <p class="text-muted">Insert new product</p>
        <button class="btn btn-primary btn-custom w-100" routerLink="/add">
          ADD PRODUCT
        </button>
      </div>
    </div>

    <div class="col-md-4 m-4">
      <div class="card-custom">
        <h5>Update Product</h5>
        <p class="text-muted">Modify existing product</p>
        <button class="btn btn-warning btn-custom w-100" routerLink="/update">
          UPDATE PRODUCT
        </button>
      </div>
    </div>

    <div class="col-md-4 m-4">
      <div class="card-custom">
        <h5>Delete Product</h5>
        <p class="text-muted">Delete existing product</p>
        <button class="btn btn-danger btn-custom w-100" routerLink="/delete">
          DELETE PRODUCT
        </button>
      </div>
    </div>

  </div>
</div>
